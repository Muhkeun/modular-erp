spring:
  application:
    name: modular-erp

  datasource:
    url: jdbc:h2:mem:modularerp;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  flyway:
    enabled: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

modular-erp:
  security:
    jwt:
      secret: modular-erp-dev-secret-key-must-be-at-least-32-bytes-long
      expiration-ms: 86400000
    rate-limit:
      enabled: true
      default-rpm: 100
      unauthenticated-rpm: 30
    sso:
      enabled: false
      provider: none
      client-id: ""
      client-secret: ""
      issuer-uri: ""
      redirect-uri: ""
      allowed-domains: []
    cors:
      allowed-origins: "*"
  ai:
    enabled: false
    provider: anthropic
    api-key: ${AI_API_KEY:}
    model: claude-sonnet-4-20250514
    max-tokens: 4096
    temperature: 0.3
    embedding:
      enabled: false
    rag:
      enabled: false
      max-results: 5

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

---
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/modularerp}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:modularerp}
    password: ${SPRING_DATASOURCE_PASSWORD:modularerp}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
