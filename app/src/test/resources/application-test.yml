spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

modular-erp:
  security:
    jwt:
      secret: test-secret-key-must-be-at-least-32-bytes-long-for-hmac
      expiration-ms: 3600000

logging:
  level:
    com.modularerp: DEBUG
    org.springframework.web: DEBUG
